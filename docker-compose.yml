version: "3.8"

services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  app1:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  app2:
    build: .
    ports:
      - "3001:3000"
    environment:
      - PORT=3000
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  app3:
    build: .
    ports:
      - "3002:3000"
    environment:
      - PORT=3000
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis